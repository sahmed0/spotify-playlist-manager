name: Daily Spotify Sorter

on:
  schedule:
    # INITIAL SYNC SCHEDULE: START AT 21:00 UTC TODAY (Feb 15)
    # This avoids triggering runs while the 19-hour block is active.
    - cron: '0,10,20,30,40,50 22,23 15 2 *' # Every 10m from 22:00 to 23:50 UTC today
    - cron: '*/10 * 16 2 *'               # Every 10m all day tomorrow (Feb 16)
    # MAINTENANCE SCHEDULE (e.g., Daily):
    # - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sort-music:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Sorter
      env:
        SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
        SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
        SPOTIPY_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        SPOTIPY_REDIRECT_URI: "http://127.0.0.1:8888/callback"
      run: python main.py

    - name: Commit State & Logs
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update sort state and logs [skip ci]"
        file_pattern: "state.db"

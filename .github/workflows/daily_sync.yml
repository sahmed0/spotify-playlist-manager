name: Daily Spotify Sorter

on:
  schedule:
    # 1. Initial Mega-Sync: Run on Feb 16 at 10:00 PM UTC
    - cron: '0 22 16 2 *'
    # 2. Weekly Maintenance: Every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  sort-music:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Sorter
      env:
        SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
        SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
        SPOTIPY_REFRESH_TOKEN: ${{ secrets.SPOTIPY_REFRESH_TOKEN }}
        LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
      run: python main.py

    - name: Commit State & Logs
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update sort state and logs [skip ci]"
        file_pattern: "state.db"

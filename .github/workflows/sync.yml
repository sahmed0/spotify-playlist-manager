name: Liked Songs Organiser

on:
  schedule:
    # Stand in schedule while testing (6pm 1st January)
    - cron: '0 18 1 1 *'
    # Eventually will sync daily but currently testing
  workflow_dispatch:

jobs:
  sort-music:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Liked Songs Organiser
      env:
        SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
        SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
        SPOTIPY_REFRESH_TOKEN: ${{ secrets.SPOTIPY_REFRESH_TOKEN }}
        LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
      run: python main.py

    - name: Commit Database
      if: always()
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update database"
        file_pattern: "state.db"
